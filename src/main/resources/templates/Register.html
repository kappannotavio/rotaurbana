<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rota Urbana – Criar Conta</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../static/css/RegisterStyle.css" />
</head>
<body>

<div class="wrapper">

  <section class="hero"> 
    <div class="hero__img"></div>
  </section>
  
    <div class="hero__copy">
      <p class="hero__tagline">
        O caminho que aproxima você<br />
        do que realmente importa,<br />
        trazendo mais <span>tempo, segurança</span><br />
        e tranquilidade para o seu dia.
      </p>
    </div>
  

  <aside class="panel">

    <div class="brand">
      <div class="brand__name">ROTA<em>URBANA</em></div>
      <div class="brand__diamond" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M10 2L18 10L10 18L2 10L10 2Z" fill="white"/>
        </svg>
      </div>
    </div>

    <form class="login-form" action="accountRegister" method="post">

      <div class="field">
        <label class="field__label" for="username">NOME COMPLETO</label>
        <input class="field__input" type="text" id="username" name="username" required />
      </div>

      <div class="field__row">
        <div class="field field--half">
          <label class="field__label" for="cpf">CPF</label>
          <input class="field__input" type="text" id="cpf" name="cpf" placeholder="Ex: xxx.xxx.xxx-xx" required />
        </div>
        <div class="field field--half">
          <label class="field__label" for="phone">TELEFONE</label>
          <input class="field__input" type="tel" id="phone" name="phone" placeholder="Ex: (xx) xxxxx-xxxx" required />
        </div>
      </div>

      <div class="field">
        <label class="field__label" for="email">E-MAIL</label>
        <input class="field__input" type="email" id="email" name="email" placeholder="seuemail@email.com" required />
      </div>

      <div class="field">
        <label class="field__label" for="password">SENHA</label>
        <input class="field__input" type="password" id="password" name="password" required />
      </div>

      <div class="field">
        <label class="field__label" for="confirmPassword">CONFIRMAR SENHA</label>
        <input class="field__input" type="password" id="confirmPassword" name="confirmPassword" required />
      </div>

      <button class="btn btn--primary" type="submit">CRIAR CONTA</button>

      <div class="divider">
        <span class="divider__line"></span>
        <span class="divider__text">ou</span>
        <span class="divider__line"></span>
      </div>

      <button class="btn btn--secondary" type="button" onclick="window.location.href='/login'">
        Já tenho conta
      </button>

    </form>

  </aside>
</div>

</body>
</html>
