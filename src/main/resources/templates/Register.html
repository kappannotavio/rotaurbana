<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/RegisterStyle.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">

    <title>Registro</title>
</head>
    <body>

        <div class = "top-bar">
            <a class="btn back-btn" href="#" role="button">⬅</a>
        </div>
        
        <div class = "main-container">
            <form action = "accountRegister" method = "post">

                <div class="usernameCamp">
                    <label for="username">NOME COMPLETO</label>
                    <input class="form-control" type="text" id="username" name="username" required>
                </div>

                <div class = "row g-4">
                    <div class="col-md-6 cpfCamp">
                        <label for="cpf">CPF</label>
                        <input class="form-control" type="text" id="cpf" name="cpf" placeholder="Ex: xxx.xxx.xxx-xx" required>
                    </div>

                    <div class="col-md-6 phoneCamp">
                        <label for="phone">TELEFONE</label>
                        <input class="form-control" type="tel" id="phone" name="phone" placeholder="Ex: (xx) xxxxx-xxxx" required>
                    </div>
                </div>

                <div class = "emailCamp">
                    <label for="email">E-MAIL</label>
                    <input class="form-control" type="email" id="email" name="email" placeholder="seuemail@email.com" required>
                </div>

                <div class = "passwordsGroup">
                    <div class = "passwordCamp">
                        <label for="password">SENHA</label>
                        <input class="form-control" type="password" id="password" name="password" required>
                    </div>

                    <div class = "confirmPasswordCamp">
                        <label for="confirmPassword">CONFIRMAR SENHA</label>
                        <input class="form-control" type="password" id="confirmPassword" name="confirmPassword" required>
                    </div>
                </div>

                <div class = "createAccountButton">
                    <button type="submit" class="btn custom-btn w-100">
                        CRIAR CONTA</button>
                </div>

            </form>
        </div>
    </body>
</html>
