<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Veículo - Rota Urbana</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-dark: #0f0f13;
      --bg-card: #1c1c21;
      --bg-card-light: #25252b;
      --bg-input: #101014;
      --border-color: #23232a;
      --accent-orange: #ff5e00;
      --accent-green: #00b37e;
      --accent-green-bg: rgba(0, 179, 126, 0.1);
      --accent-red: #f75a68;
      --accent-yellow: #eab308;
      --text-main: #ffffff;
      --text-muted: #8d8d99;
      --text-inactive: #4d4d5a;
      --purple-admin: #6f00ff;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    .app-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    .top-header {
      background-color: var(--bg-card);
      border-radius: 12px;
      padding: 16px 24px;
      margin-bottom: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-title {
      font-weight: 800;
      font-size: 1.25rem;
      margin-bottom: 2px;
    }

    .header-subtitle {
      color: var(--text-muted);
      font-size: 0.8rem;
      margin: 0;
    }

    .badge-admin {
      border: 1px solid var(--purple-admin);
      color: var(--purple-admin);
      font-size: 0.7rem;
      padding: 0.4em 0.8em;
      border-radius: 6px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .avatar-jg {
      background-color: var(--purple-admin);
      color: white;
      width: 35px;
      height: 35px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .dropdown-menu-dark {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
    }
    .dropdown-menu-dark .dropdown-item {
      color: #ccc;
      padding: 10px 20px;
      font-size: 0.9rem;
      border-radius: 6px;
    }
    .dropdown-menu-dark .dropdown-item:hover {
      background-color: var(--bg-card-light);
      color: #fff;
    }
    .dropdown-menu-dark .dropdown-divider {
      border-color: var(--border-color);
    }

    .section-header {
      margin-bottom: 24px;
    }
    .section-title {
      color: var(--accent-orange);
      font-weight: 800;
      font-size: 1.1rem;
      margin-bottom: 4px;
    }
    .onda-decorativa {
      height: 2px;
      width: 60px;
      background: linear-gradient(90deg, var(--accent-orange) 0%, transparent 100%);
      border-radius: 2px;
    }

    .card-form {
      background-color: var(--bg-card);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 32px;
    }
    .card-form label {
      font-size: 0.75rem;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 4px;
      font-weight: 600;
    }
    .card-form .form-control, .card-form .form-select {
      background-color: var(--bg-input);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      border-radius: 8px;
      padding: 12px;
      font-size: 0.9rem;
    }
    .card-form .form-control:focus, .card-form .form-select:focus {
      border-color: var(--accent-orange);
      box-shadow: 0 0 0 0.2rem rgba(255, 94, 0, 0.25);
    }
    .card-form .form-select {
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%238d8d99' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M2 5l6 6 6-6'/%3e%3c/svg%3e");
    }

    .btn-submit {
      background-color: var(--accent-orange);
      border: none;
      color: white;
      font-weight: 700;
      border-radius: 8px;
      padding: 12px 32px;
      font-size: 0.9rem;
      letter-spacing: 0.5px;
      transition: 0.2s;
    }
    .btn-submit:hover { background-color: #e65500; color: white; }
    .btn-submit:disabled { opacity: 0.6; }

    .result-box {
      padding: 12px 16px;
      border-radius: 8px;
      margin-top: 16px;
      font-weight: 600;
      font-size: 0.85rem;
    }
    .result-box.success {
      background-color: var(--accent-green-bg);
      border: 1px solid var(--accent-green);
      color: var(--accent-green);
    }
    .result-box.error {
      background-color: rgba(247, 90, 104, 0.1);
      border: 1px solid var(--accent-red);
      color: var(--accent-red);
    }

    .vehicle-card {
      background-color: var(--bg-card-light);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .vehicle-card .vehicle-info {
      flex: 1;
    }
    .vehicle-card .vehicle-plate {
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 2px;
      margin-bottom: 2px;
    }
    .vehicle-card .vehicle-details {
      color: var(--text-muted);
      font-size: 0.8rem;
    }
    .vehicle-card .vehicle-driver {
      color: var(--text-inactive);
      font-size: 0.75rem;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
    .empty-state i {
      font-size: 2.5rem;
      margin-bottom: 12px;
      display: block;
    }

    .loading-overlay {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
    }
    .spinner-custom {
      width: 48px;
      height: 48px;
      border: 4px solid var(--bg-card-light);
      border-top-color: var(--accent-orange);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: var(--bg-card-light); border-radius: 4px; }

    .offcanvas {
      background-color: var(--bg-card);
      color: var(--text-main);
    }
    .offcanvas .btn-close { filter: invert(0.7); }
    .offcanvas .form-control {
      background-color: var(--bg-input);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      border-radius: 8px;
      padding: 12px;
    }
    .offcanvas .form-control:focus {
      border-color: var(--accent-orange);
      box-shadow: 0 0 0 0.2rem rgba(255, 94, 0, 0.25);
    }
    .offcanvas label {
      font-size: 0.75rem;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .upload-btn {
      background-color: var(--bg-input);
      border: 1px dashed var(--border-color);
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      text-align: center;
      width: 100%;
      color: var(--text-muted);
      transition: all 0.2s;
    }
    .upload-btn:hover {
      border-color: var(--accent-orange);
      color: var(--accent-orange);
    }
  </style>
</head>
<body>

<div id="loadingView" class="loading-overlay">
  <div class="text-center">
    <div class="spinner-custom mx-auto mb-3"></div>
    <p class="text-muted-custom">Carregando...</p>
  </div>
</div>

<div id="mainContent" style="display:none;">

  <div class="app-container">

    <header class="top-header shadow-sm">
      <div>
        <h1 class="header-title">Cadastro de Veículo</h1>
        <p class="header-subtitle">Registrar novo ônibus</p>
      </div>
      <div class="d-flex align-items-center gap-3">
        <span class="badge-admin">ADMIN</span>
        <div class="dropdown">
          <div class="avatar-jg shadow-sm" id="adminAvatar" data-bs-toggle="dropdown" aria-expanded="false">AD</div>
          <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark shadow-lg" style="min-width:200px;">
            <li><a class="dropdown-item" href="/admin/routes"><i class="bi bi-map me-2"></i>Gerência de Rotas</a></li>
            <li><a class="dropdown-item" href="/admin/drivers"><i class="bi bi-person-badge me-2"></i>Motorista</a></li>
            <li><a class="dropdown-item active" href="/admin/vehicles"><i class="bi bi-truck me-2"></i>Veículo</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="#" onclick="editarPerfil()"><i class="bi bi-person-gear me-2"></i>Editar Perfil</a></li>
            <li><a class="dropdown-item text-danger" href="#" onclick="sair()"><i class="bi bi-box-arrow-right me-2"></i>Sair</a></li>
          </ul>
        </div>
      </div>
    </header>

    <div class="section-header">
      <h2 class="section-title">Veículos Cadastrados</h2>
      <div class="onda-decorativa"></div>
    </div>

    <div id="vehicleList" class="mb-4">
      <div class="text-muted-custom text-center py-5">Nenhum veículo cadastrado</div>
    </div>

    <div class="section-header">
      <h2 class="section-title">Novo Veículo</h2>
      <div class="onda-decorativa"></div>
    </div>

    <div class="card-form shadow-sm">
      <form id="vehicleForm">
        <div class="mb-3">
          <label>MOTORISTA</label>
          <select id="driverSelect" class="form-select" required>
            <option value="">Carregando motoristas...</option>
          </select>
        </div>
        <div class="row g-3 mb-3">
          <div class="col-md-4">
            <label>MARCA</label>
            <input type="text" id="brand" class="form-control" required placeholder="Mercedes">
          </div>
          <div class="col-md-4">
            <label>MODELO</label>
            <input type="text" id="model" class="form-control" required placeholder="OF-1721">
          </div>
          <div class="col-md-4">
            <label>COR</label>
            <input type="text" id="color" class="form-control" required placeholder="Branco">
          </div>
        </div>
        <div class="row g-3 mb-3">
          <div class="col-md-4">
            <label>PLACA</label>
            <input type="text" id="sign" class="form-control" required maxlength="8" placeholder="ABC-1234" style="text-transform:uppercase;letter-spacing:2px;">
          </div>
          <div class="col-md-4">
            <label>QUILOMETRAGEM</label>
            <input type="number" id="mileage" class="form-control" step="0.1" required placeholder="0">
          </div>
          <div class="col-md-4">
            <label>FOTO DO VEÍCULO</label>
            <div class="upload-btn" id="busImageUploadBtn" onclick="document.getElementById('busImageInput').click()">
              <i class="bi bi-camera fs-2 d-block mb-1"></i>
              <span id="busImageLabel">Clique para escolher foto</span>
              <input type="file" id="busImageInput" accept="image/*" style="display:none;">
            </div>
            <img id="busImagePreview" src="" alt="Preview" style="display:none;width:100%;height:80px;border-radius:8px;object-fit:cover;margin-top:8px;">
          </div>
        </div>
        <div id="formResult"></div>
        <button type="submit" class="btn btn-submit w-100" id="btnSubmit">CADASTRAR VEÍCULO</button>
      </form>
    </div>

  </div>

</div>

<!-- Offcanvas Editar Perfil -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasEditarPerfil">
  <div class="offcanvas-header border-bottom" style="border-color:var(--border-color)!important;">
    <h5 class="offcanvas-title fw-bold">Editar Perfil</h5>
    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body">
    <div class="image-upload-wrapper mb-4" style="display:flex;flex-direction:column;align-items:center;gap:10px;">
      <img id="editImagePreview" src="" alt="Preview"
           style="display:none; width:100px; height:100px; border-radius:50%; object-fit:cover; border:3px solid var(--accent-orange);">
      <label class="upload-btn">
        <i class="bi bi-camera fs-2 d-block mb-1"></i>
        <span>Clique para escolher foto</span>
        <input type="file" id="editImageInput" accept="image/*" style="display:none;">
      </label>
      <input type="hidden" id="editUserImageUrl">
    </div>
    <div class="mb-3">
      <label>NOME COMPLETO</label>
      <input type="text" class="form-control" id="editFullName">
    </div>
    <div class="mb-3">
      <label>ENDEREÇO</label>
      <input type="text" class="form-control" id="editAdress">
    </div>
    <div class="mb-3">
      <label>CIDADE</label>
      <input type="text" class="form-control" id="editCity">
    </div>
    <div class="mb-3">
      <label>DATA DE NASCIMENTO</label>
      <input type="date" class="form-control" id="editBirthDate">
    </div>
  </div>
  <div class="offcanvas-footer border-top p-3" style="border-color:var(--border-color)!important;">
    <button id="btnSalvarPerfil" class="btn w-100" style="background-color:var(--accent-orange);border:none;color:white;font-weight:700;border-radius:8px;padding:12px;">Salvar Alterações</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
function getCookie(name) {
    var match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
    return match ? match[2] : null;
}

var token = getCookie("token");
var userId = getCookie("userId");
var role = getCookie("role");

if (!token || role !== "ADMIN") {
    window.location.href = "/auth/login";
}

async function carregarDados() {
    try {
        var [vehiclesRes, driversRes, userRes] = await Promise.all([
            fetch('/api/admin/' + userId + '/buses', {
                headers: { 'Authorization': 'Bearer ' + token }
            }),
            fetch('/api/admin/' + userId + '/drivers', {
                headers: { 'Authorization': 'Bearer ' + token }
            }),
            fetch('/user/' + userId, {
                headers: { 'Authorization': 'Bearer ' + token }
            })
        ]);

        if (!vehiclesRes.ok) {
            if (vehiclesRes.status === 403) { window.location.href = '/auth/login'; return; }
            throw new Error('Erro ' + vehiclesRes.status);
        }

        var vehicles = await vehiclesRes.json();
        renderizarVeiculos(vehicles);

        if (driversRes.ok) {
            var drivers = await driversRes.json();
            carregarMotoristas(drivers);
        }

        if (userRes.ok) {
            var userData = await userRes.json();
            atualizarAvatar(userData);
        }
    } catch (err) {
        document.getElementById('loadingView').innerHTML = '<div class="text-center"><p class="text-danger">Erro ao carregar dados: ' + err.message + '</p><button class="btn btn-nova-rota mt-2" onclick="location.reload()">Tentar novamente</button></div>';
    }
}

function atualizarAvatar(userData) {
    var avatar = document.getElementById('adminAvatar');
    if (userData.userImageUrl && userData.userImageUrl !== 'padrao') {
        avatar.style.background = 'url(' + userData.userImageUrl + ') center/cover no-repeat';
        avatar.textContent = '';
    } else {
        var name = userData.fullName || 'Admin';
        var parts = name.trim().split(/\s+/);
        var initials = parts.length > 1 ? parts[0][0] + parts[parts.length - 1][0] : parts[0].substring(0, 2);
        avatar.textContent = initials.toUpperCase();
    }
}

function carregarMotoristas(drivers) {
    var select = document.getElementById('driverSelect');
    select.innerHTML = '<option value="">Selecione um motorista</option>';
    if (drivers.length === 0) {
        select.innerHTML = '<option value="">Nenhum motorista cadastrado</option>';
        return;
    }
    drivers.forEach(function(d) {
        var opt = document.createElement('option');
        opt.value = d.idDriver;
        opt.textContent = d.fullName + ' - ' + d.licence + ' (' + d.email + ')';
        select.appendChild(opt);
    });
}

function renderizarVeiculos(vehicles) {
    document.getElementById('loadingView').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';

    var container = document.getElementById('vehicleList');
    container.innerHTML = '';

    if (vehicles.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="bi bi-truck"></i><p>Nenhum veículo cadastrado ainda.</p></div>';
        return;
    }

    vehicles.forEach(function(v) {
        var card = document.createElement('div');
        card.className = 'vehicle-card shadow-sm';

        var details = '';
        if (v.brand) details += v.brand;
        if (v.model) details += (details ? ' ' : '') + v.model;
        if (v.color) details += (details ? ' - ' : '') + v.color;
        if (v.mileage != null) details += (details ? ' • ' : '') + v.mileage + ' km';

        card.innerHTML =
            '<div class="vehicle-info">' +
                '<div class="vehicle-plate">' + escapeHtml(v.sign || '---') + '</div>' +
                '<div class="vehicle-details">' + escapeHtml(details) + '</div>' +
                '<div class="vehicle-driver"><i class="bi bi-person me-1"></i>' + escapeHtml(v.driverName || 'Sem motorista') + '</div>' +
            '</div>' +
            (v.busImageUrl ? '<img src="' + escapeHtml(v.busImageUrl) + '" alt="Foto" style="width:48px;height:48px;border-radius:8px;object-fit:cover;flex-shrink:0;">' : '');

        container.appendChild(card);
    });
}

document.getElementById("vehicleForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    var btn = document.getElementById("btnSubmit");
    var originalText = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>CADASTRANDO...';

    var busImageUrl = '';
    var fileInput = document.getElementById('busImageInput');
    if (fileInput.files.length > 0) {
        var formData = new FormData();
        formData.append('file', fileInput.files[0]);
        var uploadRes = await fetch('/api/upload/image', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token },
            body: formData
        });
        if (uploadRes.ok) {
            var uploadData = await uploadRes.json();
            busImageUrl = uploadData.imageUrl;
        }
    }

    var data = {
        brand: document.getElementById("brand").value,
        model: document.getElementById("model").value,
        color: document.getElementById("color").value,
        sign: document.getElementById("sign").value.toUpperCase(),
        mileage: parseFloat(document.getElementById("mileage").value),
        busImageUrl: busImageUrl,
        driverId: parseInt(document.getElementById("driverSelect").value)
    };

    try {
        var res = await fetch('/api/admin/' + userId + '/buses', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify(data)
        });

        var resultDiv = document.getElementById('formResult');

        if (res.ok) {
            resultDiv.innerHTML = '<div class="result-box success">Veículo cadastrado com sucesso!</div>';
            document.getElementById('vehicleForm').reset();
            document.getElementById('busImageInput').value = '';
            document.getElementById('busImagePreview').style.display = 'none';
            document.getElementById('busImagePreview').src = '';
            document.getElementById('busImageLabel').textContent = 'Clique para escolher foto';
            setTimeout(function() { resultDiv.innerHTML = ''; }, 3000);
            var vehiclesRes = await fetch('/api/admin/' + userId + '/buses', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (vehiclesRes.ok) {
                renderizarVeiculos(await vehiclesRes.json());
            }
        } else {
            var err = await res.text();
            resultDiv.innerHTML = '<div class="result-box error">Erro: ' + escapeHtml(err) + '</div>';
        }
    } catch (err) {
        document.getElementById('formResult').innerHTML = '<div class="result-box error">Erro de rede</div>';
    } finally {
        btn.disabled = false;
        btn.innerHTML = originalText;
    }
});

document.getElementById('busImageInput').addEventListener('change', function() {
    var file = this.files[0];
    if (!file) return;
    var preview = document.getElementById('busImagePreview');
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
    document.getElementById('busImageLabel').textContent = file.name;
});

function escapeHtml(text) {
    if (!text) return '';
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(String(text)));
    return div.innerHTML;
}

function editarPerfil() {
    carregarDadosPerfil();
    var offcanvas = new bootstrap.Offcanvas(document.getElementById('offcanvasEditarPerfil'));
    offcanvas.show();
}

async function carregarDadosPerfil() {
    try {
        var res = await fetch('/user/' + userId, {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!res.ok) return;
        var data = await res.json();
        document.getElementById('editFullName').value = data.fullName || '';
        document.getElementById('editAdress').value = data.adress || '';
        document.getElementById('editCity').value = data.city || '';
        if (data.birthday) document.getElementById('editBirthDate').value = data.birthday;
        var preview = document.getElementById('editImagePreview');
        if (data.userImageUrl && data.userImageUrl !== 'padrao') {
            preview.src = data.userImageUrl;
            preview.style.display = 'block';
        } else {
            preview.src = '';
            preview.style.display = 'none';
        }
        if (data.userImageUrl) document.getElementById('editUserImageUrl').value = data.userImageUrl;
    } catch (e) { console.error('Erro ao carregar perfil:', e); }
}

document.getElementById('editImageInput').addEventListener('change', function() {
    var file = this.files[0];
    if (!file) return;
    var preview = document.getElementById('editImagePreview');
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
    preview.style.width = '100px';
    preview.style.height = '100px';
    preview.style.borderRadius = '50%';
    preview.style.objectFit = 'cover';
    preview.style.border = '3px solid var(--accent-orange)';
    preview.style.margin = '0 auto';
});

document.getElementById('btnSalvarPerfil').addEventListener('click', async function() {
    var btn = this;
    var originalText = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Salvando...';
    try {
        var imageUrl = document.getElementById('editUserImageUrl').value || 'padrao';
        var fileInput = document.getElementById('editImageInput');
        if (fileInput.files.length > 0) {
            var formData = new FormData();
            formData.append('file', fileInput.files[0]);
            var uploadRes = await fetch('/api/upload/image', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token },
                body: formData
            });
            if (uploadRes.ok) {
                var uploadData = await uploadRes.json();
                imageUrl = uploadData.imageUrl;
            }
        }
        var params = new URLSearchParams();
        params.append('fullName', document.getElementById('editFullName').value);
        params.append('adress', document.getElementById('editAdress').value);
        params.append('city', document.getElementById('editCity').value);
        params.append('birthDate', document.getElementById('editBirthDate').value);
        params.append('userImageUrl', imageUrl);
        var updateRes = await fetch('/user/' + userId, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Authorization': 'Bearer ' + token },
            body: params.toString()
        });
        if (updateRes.ok) {
            var offcanvas = bootstrap.Offcanvas.getInstance(document.getElementById('offcanvasEditarPerfil'));
            if (offcanvas) offcanvas.hide();
            location.reload();
        } else { alert('Erro ao atualizar perfil.'); }
    } catch (e) { console.error('Erro:', e); alert('Erro de conexão.'); }
    finally { btn.disabled = false; btn.innerHTML = originalText; }
});

function sair() {
    document.cookie = 'token=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT';
    document.cookie = 'userId=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT';
    document.cookie = 'driverId=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT';
    document.cookie = 'role=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT';
    window.location.href = '/auth/login';
}

carregarDados();
</script>
