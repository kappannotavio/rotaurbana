<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logs - Rota Urbana</title>
  <link rel="icon" type="image/x-icon" href="/images/system/logo-icon.ico">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/admin/logs.css" />
</head>
<body>

<div id="loadingView" class="loading-overlay">
  <div class="text-center">
    <div class="spinner-custom mx-auto mb-3"></div>
    <p class="text-muted-custom">Carregando logs...</p>
  </div>
</div>

<div id="mainContent" style="display:none;">

  <div class="app-container">

    <header class="top-header shadow-sm">
      <div>
        <h1 class="header-title">Registro de Atividades</h1>
        <p class="header-subtitle">Histórico de ações realizadas no sistema</p>
      </div>
      <div class="d-flex align-items-center gap-3">
        <span class="badge-admin">ADMIN</span>
        <div class="dropdown">
          <div class="avatar-jg shadow-sm" id="adminAvatar" data-bs-toggle="dropdown" aria-expanded="false">AD</div>
          <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark shadow-lg" style="min-width:200px;">
            <li><a class="dropdown-item" href="/admin/routes"><i class="bi bi-map me-2"></i>Gerência de Rotas</a></li>
            <li><a class="dropdown-item" href="/admin/drivers"><i class="bi bi-person-badge me-2"></i>Motorista</a></li>
            <li><a class="dropdown-item" href="/admin/vehicles"><i class="bi bi-truck me-2"></i>Veículo</a></li>
            <li><a class="dropdown-item" href="/admin/users"><i class="bi bi-people me-2"></i>Usuários</a></li>
            <li><a class="dropdown-item" href="/admin/logs"><i class="bi bi-clock-history me-2"></i>Logs</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="#" onclick="editarPerfil()"><i class="bi bi-person-gear me-2"></i>Editar Perfil</a></li>
            <li><a class="dropdown-item text-danger" href="#" onclick="sair()"><i class="bi bi-box-arrow-right me-2"></i>Sair</a></li>
          </ul>
        </div>
      </div>
    </header>

    <div class="section-header">
      <h2 class="section-title">Atividades Recentes</h2>
      <div class="onda-decorativa"></div>
    </div>

    <div class="filter-bar mb-4">
      <button class="filter-btn active" data-type="" onclick="filtrarTipo(this, '')">Todas</button>
      <button class="filter-btn" data-type="USUARIO" onclick="filtrarTipo(this, 'USUARIO')">Usuários</button>
      <button class="filter-btn" data-type="MOTORISTA" onclick="filtrarTipo(this, 'MOTORISTA')">Motoristas</button>
      <button class="filter-btn" data-type="ONIBUS" onclick="filtrarTipo(this, 'ONIBUS')">Ônibus</button>
      <button class="filter-btn" data-type="ROTA" onclick="filtrarTipo(this, 'ROTA')">Rotas</button>
      <button class="filter-btn" data-type="PRESENCA" onclick="filtrarTipo(this, 'PRESENCA')">Presenças</button>
      <button class="filter-btn" data-type="PAGAMENTO" onclick="filtrarTipo(this, 'PAGAMENTO')">Pagamentos</button>
    </div>

    <div id="logList" class="d-flex flex-column gap-2">
      <div class="text-muted-custom text-center py-5">Nenhum registro encontrado</div>
    </div>

  </div>

</div>

<!-- Offcanvas Editar Perfil -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasEditarPerfil">
  <div class="offcanvas-header border-bottom" style="border-color:var(--border-color)!important;">
    <h5 class="offcanvas-title fw-bold">Editar Perfil</h5>
    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body">
    <div class="image-upload-wrapper mb-4" style="display:flex;flex-direction:column;align-items:center;gap:10px;">
      <img id="editImagePreview" src="" alt="Preview"
           style="display:none; width:100px; height:100px; border-radius:50%; object-fit:cover; border:3px solid var(--accent-orange);">
      <label class="upload-btn">
        <i class="bi bi-camera fs-2 d-block mb-1"></i>
        <span>Clique para escolher foto</span>
        <input type="file" id="editImageInput" accept="image/*" style="display:none;">
      </label>
      <input type="hidden" id="editUserImageUrl">
    </div>
    <div class="mb-3">
      <label>NOME COMPLETO</label>
      <input type="text" class="form-control" id="editFullName">
    </div>
    <div class="mb-3">
      <label>ENDEREÇO</label>
      <input type="text" class="form-control" id="editAdress">
    </div>
    <div class="mb-3">
      <label>CIDADE</label>
      <input type="text" class="form-control" id="editCity">
    </div>
    <div class="mb-3">
      <label>DATA DE NASCIMENTO</label>
      <input type="date" class="form-control" id="editBirthDate">
    </div>
  </div>
  <div class="offcanvas-footer border-top p-3" style="border-color:var(--border-color)!important;">
    <button id="btnSalvarPerfil" class="btn w-100" style="background-color:var(--accent-orange);border:none;color:white;font-weight:700;border-radius:8px;padding:12px;">Salvar Alterações</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/admin/logs.js"></script>
</body>
</html>
