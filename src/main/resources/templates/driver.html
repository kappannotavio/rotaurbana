<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motorista - Rota Urbana</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-main: #111116; --bg-card: #18181e; --primary-orange: #ff5722; --text-muted: #8e8e9e; }
        body { background-color: var(--bg-main); color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .card-custom { background-color: var(--bg-card); border-radius: 16px; padding: 30px; border: none; }
        .btn-orange { background-color: var(--primary-orange); border: none; border-radius: 12px; padding: 12px 24px; font-weight: 600; color: #fff; }
        .btn-orange:hover { background-color: #e64a19; color: #fff; }
        .btn-outline-custom { border: 1px solid #333; border-radius: 12px; padding: 12px 24px; color: var(--text-muted); }
        .text-muted-custom { color: var(--text-muted); }
        .bus-card { background: #1e1e24; border-radius: 12px; padding: 16px; border: 1px solid #2a2a32; cursor: pointer; transition: all 0.2s; }
        .bus-card:hover { border-color: var(--primary-orange); }
        .bus-card.selected { border-color: var(--primary-orange); box-shadow: 0 0 12px rgba(255,87,34,0.3); }
        .loading { text-align: center; padding: 40px; color: var(--text-muted); }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top-color: var(--primary-orange); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="mb-1">Painel do Motorista</h3>
            <small class="text-muted-custom" id="driverInfo">Carregando...</small>
        </div>
        <a href="/auth/login" class="btn btn-outline-danger btn-sm">Sair</a>
    </div>

    <div id="loadingView" class="loading">
        <div class="spinner"></div>
        <p>Carregando seus ônibus...</p>
    </div>

    <div id="busesView" style="display:none;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0">Meus Ônibus</h5>
        </div>
        <div id="busesList" class="row g-3"></div>
    </div>

    <div id="routesView" style="display:none;" class="mt-4">
        <div class="d-flex align-items-center mb-3">
            <button class="btn btn-sm btn-outline-secondary me-2" onclick="backToBuses()">← Voltar</button>
            <h5 class="mb-0">Rotas - <span id="selectedBusName"></span></h5>
        </div>
        <div id="routesList" class="row g-3"></div>
    </div>
</div>

<script>
function getCookie(name) {
    const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
    return match ? match[2] : null;
}

const token = getCookie("token");
const userId = getCookie("userId");
const driverId = getCookie("driverId");

if (!token || !driverId || driverId === "" || driverId === "null") {
    window.location.href = "/auth/login";
}

document.getElementById("driverInfo").textContent = "ID do motorista: " + driverId;

async function loadBuses() {
    document.getElementById("loadingView").style.display = "block";
    document.getElementById("busesView").style.display = "none";

    try {
        const res = await fetch("/api/driver/" + driverId + "/buses", {
            headers: { "Authorization": "Bearer " + token }
        });

        if (!res.ok) throw new Error("Erro " + res.status);

        const buses = await res.json();
        document.getElementById("loadingView").style.display = "none";
        document.getElementById("busesView").style.display = "block";

        const container = document.getElementById("busesList");
        container.innerHTML = "";

        if (buses.length === 0) {
            container.innerHTML = '<div class="col-12 text-center text-muted-custom">Nenhum ônibus atribuído a você</div>';
            return;
        }

        buses.forEach(b => {
            const col = document.createElement("div");
            col.className = "col-md-6";
            col.innerHTML = `
                <div class="bus-card" onclick="loadRoutes(${b.idBus}, '${b.sign || b.code}')">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <h6 class="mb-1">${b.sign || 'Sem placa'}</h6>
                            <small class="text-muted-custom">${b.brand || ''} ${b.model || ''}</small>
                        </div>
                        <span class="badge bg-secondary">${b.code || ''}</span>
                    </div>
                    <div class="mt-2">
                        <small class="text-muted-custom">${b.color || ''}</small>
                    </div>
                </div>
            `;
            container.appendChild(col);
        });
    } catch (err) {
        document.getElementById("loadingView").innerHTML = `
            <p class="text-danger">Erro ao carregar ônibus: ${err.message}</p>
            <button class="btn btn-orange" onclick="loadBuses()">Tentar novamente</button>
        `;
    }
}

async function loadRoutes(busId, busName) {
    document.getElementById("busesView").style.display = "none";
    document.getElementById("routesView").style.display = "block";
    document.getElementById("selectedBusName").textContent = busName;
    document.getElementById("routesList").innerHTML = '<div class="col-12 text-center text-muted-custom"><div class="spinner"></div><p class="mt-2">Carregando rotas...</p></div>';

    try {
        const res = await fetch("/api/driver/" + driverId + "/buses/" + busId + "/routes", {
            headers: { "Authorization": "Bearer " + token }
        });

        if (!res.ok) throw new Error("Erro " + res.status);

        const routes = await res.json();
        const container = document.getElementById("routesList");
        container.innerHTML = "";

        if (routes.length === 0) {
            container.innerHTML = '<div class="col-12 text-center text-muted-custom">Nenhuma rota para este ônibus</div>';
            return;
        }

        routes.forEach(r => {
            const col = document.createElement("div");
            col.className = "col-md-6";
            col.innerHTML = `
                <div class="bus-card" onclick="startTracking(${busId}, ${r.idRoute})">
                    <h6 class="mb-1">${r.destiny || 'Sem destino'}</h6>
                    <small class="text-muted-custom">
                        ${r.departureTime || '--:--'} → ${r.destinationTime || '--:--'}
                    </small>
                    <div class="mt-1">
                        <span class="badge bg-secondary">${r.code || ''}</span>
                    </div>
                </div>
            `;
            container.appendChild(col);
        });
    } catch (err) {
        document.getElementById("routesList").innerHTML = `
            <div class="col-12 text-center">
                <p class="text-danger">Erro ao carregar rotas: ${err.message}</p>
                <button class="btn btn-orange" onclick="backToBuses()">Voltar</button>
            </div>
        `;
    }
}

function backToBuses() {
    document.getElementById("routesView").style.display = "none";
    document.getElementById("busesView").style.display = "block";
}

function startTracking(busId, routeId) {
    window.location.href = "/sendLocation?busId=" + busId + "&routeId=" + routeId;
}

loadBuses();
</script>

</body>
</html>
