<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="/css/LoginScreen.css" rel="stylesheet">

</head>
<body>

<div class="container d-flex flex-column align-items-center justify-content-center vh-100">

    <img src="/images/LogoProjeto.png" class="logo mb-4" alt="Logo">

    <div class="card login-box p-4 shadow">

        <form id="loginForm">

            <div class="mb-3">
                <label class="form-label">E-MAIL</label>
                <input type="text" name="email" class="form-control" placeholder="joao.silva@email.com">
            </div>

            <div class="mb-3">
                <label class="form-label">SENHA</label>
                <input type="password" name="password" class="form-control" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;">
            </div>

            <div class="text-end mb-3">
                <a href="#" class="forgot">Esqueci a senha</a>
            </div>

            <button type="submit" class="btn btn-login w-100 mb-3">
                ENTRAR
            </button>

            <div class="divider text-center mb-3">
                <span>OU</span>
            </div>

            <button type="button" class="btn btn-outline-secondary w-100 btn-secondary-custom" onclick="window.location.href='/auth/register'">
                CRIAR NOVA CONTA
            </button>

        </form>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/Login.js"></script>

</body>
</html>
