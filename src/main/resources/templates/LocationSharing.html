<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compartilhar Localização</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #121212;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: system-ui, sans-serif;
        }
        .card {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            max-width: 480px;
        }
        .form-control, .form-select {
            background: #2a2a2a;
            border: 1px solid #444;
            color: #e0e0e0;
        }
        .form-control:focus, .form-select:focus {
            background: #2a2a2a;
            color: #e0e0e0;
            border-color: #0d6efd;
        }
        .code-display {
            background: #2a2a2a;
            border: 2px dashed #00d28a;
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 4px;
            color: #00d28a;
            margin: 1rem 0;
        }
        .status {
            text-align: center;
            padding: 0.5rem;
            border-radius: 8px;
            background: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #555;
            flex-shrink: 0;
        }
        .status-dot.active {
            background: #00d28a;
            box-shadow: 0 0 6px #00d28a;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
        .route-info {
            text-align: center;
            font-size: 0.9rem;
            color: #aaa;
            margin-top: -0.5rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
<div class="card">
    <h2 class="mb-3 text-center">Compartilhar Localização</h2>

    <label for="busSelect" class="form-label">Selecione o ônibus:</label>
    <select id="busSelect" class="form-select mb-3">
        <option value="">Carregando...</option>
    </select>

    <label for="routeSelect" class="form-label">Selecione a rota:</label>
    <select id="routeSelect" class="form-select mb-2" disabled>
        <option value="">Primeiro selecione um ônibus</option>
    </select>

    <div class="route-info" id="routeInfo"></div>

    <div class="code-display" id="codeDisplay">------</div>
    <p class="text-center text-muted small mb-3">Compartilhe este código com os passageiros</p>

    <div class="status"><span class="status-dot" id="statusIndicator"></span><span id="statusText"> Aguardando início do compartilhamento...</span></div>
</div>

<script src="/js/Config.js"></script>
<script src="/js/LocationSharing.js"></script>
</body>
</html>
