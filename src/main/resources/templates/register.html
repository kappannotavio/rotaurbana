<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rota Urbana – Criar Conta</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/RegisterStyle.css" />
</head>
<body>

<div class="wrapper">

  <section class="hero"> 
    <div class="hero__img"></div>
  </section>
  
    <div class="hero__copy d-none d-md-block">
      <p class="hero__tagline">
        O caminho que aproxima você<br />
        do que realmente importa,<br />
        trazendo mais <span>tempo, segurança</span><br />
        e tranquilidade para o seu dia.
      </p>
    </div>
  

  <aside class="panel">

    <div class="brand">
      <div class="brand__name">ROTA<em>URBANA</em></div>
      <div class="brand__diamond" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M10 2L18 10L10 18L2 10L10 2Z" fill="white"/>
        </svg>
      </div>
    </div>

    <form class="login-form" id="registerForm" novalidate>

      <div class="field">
        <label class="field__label" for="fullName">NOME COMPLETO</label>
        <input class="field__input" type="text" id="fullName" name="fullName" required />
      </div>

      <div class="field__row">
        <div class="field field--half">
          <label class="field__label" for="adress">ENDEREÇO</label>
          <input class="field__input" type="text" id="adress" name="adress" placeholder="Rua Exemplo, 123" required />
        </div>
        <div class="field field--half">
          <label class="field__label" for="city">CIDADE</label>
          <input class="field__input" type="text" id="city" name="city" placeholder="São Paulo" required />
        </div>
      </div>

      <div class="field">
        <label class="field__label" for="email">E-MAIL</label>
        <input class="field__input" type="email" id="email" name="email" placeholder="seu@email.com" required />
      </div>

      <div class="field">
        <label class="field__label" for="birthDate">DATA DE NASCIMENTO</label>
        <input class="field__input" type="date" id="birthDate" name="birthDate" required />
      </div>

      <div class="field__row">
        <div class="field field--half">
          <label class="field__label" for="password">SENHA</label>
          <input class="field__input" type="password" id="password" name="password" required />
        </div>
        <div class="field field--half">
          <label class="field__label" for="confirmPassword">CONFIRMAR SENHA</label>
          <input class="field__input" type="password" id="confirmPassword" name="confirmPassword" required />
        </div>
      </div>

      <div class="field">
        <label class="field__label">FOTO DE PERFIL (OPCIONAL)</label>
        <div style="display:flex; align-items:center; gap:15px; margin-top:8px;">
          <img id="registerImagePreview" src="" alt="Preview"
               style="display:none; width:80px; height:80px; border-radius:50%; object-fit:cover; border:3px solid #FF5C1A;">
          <label class="custom-file-upload" style="cursor:pointer; background:var(--input-bg,#1a1a24); border:1px dashed var(--border-color,#333); border-radius:12px; padding:15px 20px; text-align:center; flex:1; color:var(--muted,#888); transition:all 0.2s;">
            <i class="bi bi-camera fs-4 d-block mb-1"></i>
            <span style="font-size:0.85rem;">Clique para escolher foto</span>
            <input type="file" id="registerImage" accept="image/*" style="display:none;">
          </label>
        </div>
      </div>

      <div id="errorMsg" class="text-danger mb-2 mt-2" style="display:none;"></div>

      <button class="btn btn--primary" type="submit" id="btnRegister">CRIAR CONTA</button>

      <div class="divider">
        <span class="divider__line"></span>
        <span class="divider__text">ou</span>
        <span class="divider__line"></span>
      </div>

      <button class="btn btn--secondary" type="button" onclick="window.location.href='/auth/login'">
        Já tenho conta
      </button>

    </form>

  </aside>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById("registerForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirmPassword").value;
    const errorEl = document.getElementById("errorMsg");

    if (password !== confirm) {
        errorEl.textContent = "Senhas não conferem";
        errorEl.style.display = "";
        return;
    }

    errorEl.style.display = "none";

    const btn = document.getElementById("btnRegister");
    btn.disabled = true;
    btn.textContent = "Cadastrando...";

    try {
        let userImageUrl = "padrao";
        const fileInput = document.getElementById("registerImage");
        if (fileInput && fileInput.files.length > 0) {
            const formData = new FormData();
            formData.append("file", fileInput.files[0]);
            const uploadRes = await fetch("/api/upload/image", {
                method: "POST",
                body: formData
            });
            if (uploadRes.ok) {
                const uploadData = await uploadRes.json();
                userImageUrl = uploadData.imageUrl;
            }
        }

        const res = await fetch("/auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                fullName: document.getElementById("fullName").value,
                adress: document.getElementById("adress").value,
                city: document.getElementById("city").value,
                email: document.getElementById("email").value,
                password: password,
                birthDate: document.getElementById("birthDate").value,
                userImageUrl: userImageUrl
            })
        });

        if (res.ok) {
            window.location.href = "/auth/login";
        } else {
            const text = await res.text();
            errorEl.textContent = text ? "Erro: " + text : "E-mail já cadastrado";
            errorEl.style.display = "";
        }
    } catch (err) {
        errorEl.textContent = "Erro de conexão";
        errorEl.style.display = "";
    } finally {
        btn.disabled = false;
        btn.textContent = "CRIAR CONTA";
    }
});

document.getElementById("registerImage").addEventListener("change", function() {
    const file = this.files[0];
    if (!file) return;
    const preview = document.getElementById("registerImagePreview");
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
});
</script>
</body>
</html>
