<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rota Urbana – Criar Conta</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/auth/register-style.css" />
</head>
<body>

<div class="wrapper">

  <section class="hero"> 
    <div class="hero__img"></div>
  </section>
  
    <div class="hero__copy d-none d-md-block">
      <p class="hero__tagline">
        O caminho que aproxima você<br />
        do que realmente importa,<br />
        trazendo mais <span>tempo, segurança</span><br />
        e tranquilidade para o seu dia.
      </p>
    </div>
  

  <aside class="panel">

    <div class="brand">
      <div class="brand__name">ROTA<em>URBANA</em></div>
      <div class="brand__diamond" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M10 2L18 10L10 18L2 10L10 2Z" fill="white"/>
        </svg>
      </div>
    </div>

    <form class="login-form" id="registerForm" novalidate>

      <div class="field">
        <label class="field__label" for="fullName">NOME COMPLETO</label>
        <input class="field__input" type="text" id="fullName" name="fullName" required />
      </div>

      <div class="field__row">
        <div class="field field--half">
          <label class="field__label" for="adress">ENDEREÇO</label>
          <input class="field__input" type="text" id="adress" name="adress" placeholder="Rua Exemplo, 123" required />
        </div>
        <div class="field field--half">
          <label class="field__label" for="city">CIDADE</label>
          <input class="field__input" type="text" id="city" name="city" placeholder="São Paulo" required />
        </div>
      </div>

      <div class="field">
        <label class="field__label" for="email">E-MAIL</label>
        <input class="field__input" type="email" id="email" name="email" placeholder="seu@email.com" required />
      </div>

      <div class="field">
        <label class="field__label" for="birthDate">DATA DE NASCIMENTO</label>
        <input class="field__input" type="date" id="birthDate" name="birthDate" required />
      </div>

      <div class="field__row">
        <div class="field field--half">
          <label class="field__label" for="password">SENHA</label>
          <input class="field__input" type="password" id="password" name="password" required />
        </div>
        <div class="field field--half">
          <label class="field__label" for="confirmPassword">CONFIRMAR SENHA</label>
          <input class="field__input" type="password" id="confirmPassword" name="confirmPassword" required />
        </div>
      </div>

      <div class="field">
        <label class="field__label">FOTO DE PERFIL (OPCIONAL)</label>
        <div class="field__row" style="align-items:center; gap:15px; margin-top:8px;">
          <img id="registerImagePreview" src="" alt="Preview" class="image-preview">
          <label class="file-upload-btn">
            <i class="bi bi-camera file-upload-icon"></i>
            <span class="file-upload-text">Clique para escolher foto</span>
            <input type="file" id="registerImage" accept="image/*" style="display:none;">
          </label>
        </div>
      </div>

      <div id="errorMsg" class="text-danger mb-2 mt-2" style="display:none;"></div>

      <button class="btn btn--primary" type="submit" id="btnRegister">CRIAR CONTA</button>

      <div class="divider">
        <span class="divider__line"></span>
        <span class="divider__text">ou</span>
        <span class="divider__line"></span>
      </div>

      <button class="btn btn--secondary" type="button" onclick="window.location.href='/auth/login'">
        Já tenho conta
      </button>

    </form>

  </aside>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/auth/register.js"></script>
</body>
</html>
